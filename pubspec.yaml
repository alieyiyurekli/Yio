name: yio_recipe_app
description: "A modern Flutter food recipe application with Material 3 design."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0

  # State Management
  provider: ^6.0.0

  # Media
  image_picker: ^1.0.0
  video_player: ^2.8.0

  # Networking
  http: ^1.2.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # Utilities
  intl: ^0.19.0
  wakelock_plus: ^1.5.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.5
  photo_view: ^0.15.0
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
